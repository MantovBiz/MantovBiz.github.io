title: "Mantov's Portfolio"
description: "Projects, Research & Articles by Manuel Tovar — MIS & Business Analytics at DePaul University."
author: Manuel Tovar
url: "https://MantovBiz.github.io"
baseurl: ""
lang: en
timezone: America/Chicago

# Theme
theme: minima

# Navigation
header_pages:
  - index.md
  - about.md
  - projects.md
  - articles.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Clean URLs: posts become /research/chicago-bears-2025/ instead of /2026/03/13/title.html
permalink: /:categories/:title/

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true        # gives every heading an id — required for TOC anchor links

# Feed
feed:
  path: feed.xml
