<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <!--
      WHAT MINIMA'S ORIGINAL DEFAULT.HTML DOES:

        <main class="page-content" aria-label="Content">
          <div class="wrapper">          ← max-width: 800px + padding: 30px
            {{ content }}
          </div>
        </main>

      Both the .wrapper div AND the padding on .page-content are removed
      here. The about page's .ab-shell div owns all its own padding and
      layout, so it doesn't need Minima's wrapper at all.

      Other pages (index, articles, projects) that DO rely on Minima's
      centered layout should use layout: page or layout: post instead of
      layout: default — those layouts keep their own wrappers untouched.
    -->

    <main class="page-content" aria-label="Content" style="padding:0;margin:0;width:100%;">
      {{ content }}
    </main>

    {%- include footer.html -%}

  </body>

</html>
